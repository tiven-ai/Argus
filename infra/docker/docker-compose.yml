services:
  postgres:
    image: postgres:16-alpine
    container_name: argus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    ports:
      - '5432:5432'
    volumes:
      - argus-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U argus -d argus']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  argus-pgdata:
