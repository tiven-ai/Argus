name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus
          POSTGRES_DB: argus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://argus:argus@localhost:5432/argus

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  docs-links:
    name: docs · dead-link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check internal doc links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml './docs/**/*.md' './README.md'
          fail: true

  docs-build:
    name: docs · portal build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs portal
        run: pnpm --filter @argus/docs build

  openapi-drift:
    name: openapi · drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # gen:openapi imports @argus/shared-types, which resolves to its built
      # dist/. Build the server's workspace deps first (a fresh checkout has no
      # dist/). Unlike the test/build tasks, gen:openapi bypasses turbo's ^build.
      - name: Build workspace dependencies
        run: pnpm --filter "@argus/server^..." build

      - name: Regenerate OpenAPI spec
        run: pnpm --filter @argus/server gen:openapi

      - name: Fail if the committed spec is stale
        run: git diff --exit-code docs/api/openapi.yaml
